name: Update SPMO monitor

on:
  schedule:
    # 22:30 UTC weekdays = 5:30pm EDT / 6:30pm EST — after US close & settlement
    - cron: "30 22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r scripts/requirements.txt

      - name: Rebuild dashboard
        run: python scripts/update.py

      - name: Commit if changed
        run: |
          git config user.name "spmo-bot"
          git config user.email "actions@github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "Auto-update $(date -u +%F)"
            git push
          fi
